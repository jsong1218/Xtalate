notes: >-
  The rich all-fields anchor: a CO diatomic relaxing over three frames, each carrying a 6 Å cubic
  cell with pbc=(T,T,T), source-written isotope masses (12.011, 15.999 — never ASE-derived), a
  velocity field (stored as ASE momenta, unit-converted to Å/fs by the ase.units.fs factor at the
  parser boundary), a FixAtoms([0]) constraint mapped to Constraint(kind="fixed_atoms") (D58), an
  info["step"] carried into user_metadata.custom_per_frame['ase_traj:step'], and a calculator
  energy + forces mapped to electronic.total_energy / dynamics.forces. Every value is exact and
  hand-chosen, so each number in expected.canonical.json is verifiable against the Atoms built in
  _generate.py — the ULM binary is only the transport. Also the round-trip *source* that enrols
  ase_traj into the two/three-hop matrix (tests/roundtrip/_matrix.py:_GOLDEN_DIRS): the one Phase-1
  fixture that flows velocities + forces + a constraint through the whole matrix.

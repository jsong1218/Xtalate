notes: >-
  The minimal-molecule + laundering anchor: one isolated water frame with only symbols and
  positions. ASE always hands back a fully-populated Atoms, so this fixture proves the parser
  launders every manufactured default back to absence (P3) on a *real committed* file, not only in
  the unit fixtures — cell (an all-zero 3×3) → None, masses (Z-derivable) → None, momenta (zeroed)
  → dynamics.velocities None, and the empty constraints list → dynamics.constraints None (D58
  addendum). A single frame carries no time axis, so trajectory launders to None as well.

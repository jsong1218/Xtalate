notes: >-
  The fixed-cell form: one 7-line header, then back-to-back `Direct configuration=` blocks
  sharing the header lattice. Tests multi-frame reading with frame ordering preserved via
  frame.index, the fractional→Cartesian conversion at the parser boundary (§4), format-defined
  pbc=(T,T,T) (§3 n.3), the title carried into user_metadata.custom_global['xdatcar:comment'],
  the scaling factor recorded as a provenance parse-note (folded into the lattice, §4;
  DECISIONS.md D34), and trajectory.timestep = None — XDATCAR numbers configurations but
  declares no time axis (§3 n.5), so absence is recorded rather than a POTIM default invented.
  Every fractional coordinate is an exact binary fraction (0, 1/4, 1/2) against a 5.6 Å cubic
  cell, so each expected Cartesian value (1.4, 2.8) is exactly representable in float64 and was
  hand-derived rather than read back off the parser.

notes: >-
  The degenerate case: a trajectory format holding exactly one configuration. Pins the Part 2
  §3.2 rule that a lone frame is a *structure*, not a trajectory — trajectory is None here, not
  a container with timestep = None — so a one-frame XDATCAR and a POSCAR of the same structure
  agree on the canonical shape. This is the boundary where an off-by-one in the streaming
  frame loop or in the materializer's trajectory-dropping rule would show up.

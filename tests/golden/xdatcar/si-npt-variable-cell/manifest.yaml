notes: >-
  The NpT form, and the format's distinctive canonical feature: VASP restates the whole 7-line
  header before each configuration when the cell varies, so Frame.cell legitimately differs
  frame to frame. The cell expands 5.6 → 5.8 → 6.0 Å while the fractional coordinates hold
  constant, which is precisely the case that catches a parser reusing frame 0's lattice: the
  identical Direct coordinates must yield *different* Cartesian positions (2.8 → 2.9 → 3.0 Å).
  Reading only the first header would silently misplace every atom after frame 0 — the class of
  loss the mission exists to prevent (P1). Every expected value is exact in float64 (0.5 × a
  halves an exponent) and was hand-derived.

notes: >-
  The M17 anchor case. a=b=3, c=5, gamma=120 makes the lattice construction from cell
  *parameters* (CIF's native form, unlike every other Phase 1 format) hand-checkable:
  site O1 at fractional (1/3, 2/3, 1/2) must land at Cartesian (0, sqrt(3), 2.5).
  Also covers the identity-only symop loop (a P 1 file wearing a symmetry loop, which needs
  no expansion), the space-group symbol mapped to cell.space_group rather than duplicated
  into simulation.extra, format-defined pbc=(T,T,T) (§3 n.3), a standard uncertainty on
  _cell_volume read as its value, occupancy and site labels carried verbatim into
  custom_per_atom under 'cif:' keys (§3 n.11), and bibliographic tags carried into
  simulation.extra (§3 n.9).

expectation:
  issue_codes:
    - CIF_OCCUPANCY_NOT_MODELLED
    - CIF_PARTIAL_OCCUPANCY
    - CIF_OXIDATION_NUMBER_DISAGREES_WITH_SYMBOL
    - CIF_TAGS_CARRIED
  stoichiometry: partial_occupancy
  stoichiometry_note: >-
    The file declares `Fe2.1 S1.9` per cell, which no integral atom list can equal: the iron
    site is refined at 0.05/0.95 occupancy, so the declared composition is an average over
    sites that are sometimes empty. The expansion produces 4 Fe and 2 S — whole atoms at every
    site, which is what a converter that does not model occupancy must do. The oracle is not
    being silenced here; it is being told that the file's own arithmetic and the atom list
    answer different questions.
findings:
  - >-
    CIF_OXIDATION_NUMBER_DISAGREES_WITH_SYMBOL is *correct* here, and this case exists partly
    to record that. The type symbol is `Fe2+` while `_atom_type_oxidation_number` is 1.800 —
    not a typo but real chemistry: pyrrhotite is iron-deficient and mixed-valence, so the
    refined average valence is genuinely non-integral while the symbol carries the nominal
    integer. M19's reconciliation check was written against synthetic disagreements; this is
    the first real file to trip it, and it tripped it for the right reason. A declared issue
    code is not automatically a defect, and this manifest says which kind it is.
  - >-
    This is the corpus's first file with *genuine* partial occupancy, and it is what the slice 3
    occupancy fix was measured against. CIF_PARTIAL_OCCUPANCY appears here and on
    `unknown-value-markers-and-half-occupancy`, and on no other case in the corpus — not on
    `nacl-legacy-symmetry-tags`, whose column is all 1.0, and not on
    `fluorite-no-occupancy-column`, which has no column at all. The three positions were pinned
    before the fix was written, so the fix had to distinguish them rather than merely quiet the
    warning; a change that silenced too much would have turned this case red.
notes: >-
  Two axes in one file, which is why it is worth its weight: occupancy < 1 and oxidation-state
  symbols, on a mineral where both are physically meaningful rather than decorative. The 0.05 /
  0.95 occupancy pair is more instructive than a tidy 0.5 would be — it is the shape real
  refinement produces, and it makes the declared composition (Fe2.1) visibly non-integral, so
  the `partial_occupancy` skip is self-evidently justified rather than merely asserted.

notes: >-
  The corpus's largest expansion: 14 declared sites become 264 atoms across three elements,
  every one of which the file's own formula (`Al8 Ca12 O24` x Z=6) accounts for exactly. Scale
  is the axis being tested. D67's special-position merge runs on a physical distance threshold,
  and a threshold that is slightly too generous costs nothing on a 6-atom cell while silently
  eating atoms on a large one — 264 sites give it far more chances to be wrong, and the
  three-element breakdown localises the damage if it ever is.

  The failure this guards against is the cardinal sin in its quietest form. A structure with
  too few atoms still parses, still writes, still looks plausible in a viewer; nothing announces
  it. Only an independent count catches it, and here the file supplies one.

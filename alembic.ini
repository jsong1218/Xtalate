# Alembic configuration for the Xtalate service database (v0.5 M21 slice 3).
#
# The database URL is deliberately NOT set here: env.py reads it from the service settings
# (XTALATE_DATABASE_URL / the Settings default), so migrations target whatever the environment
# targets — SQLite in Tier 0, PostgreSQL in Tier 1 — with no second place to configure it and no
# credential ever written to a tracked file (CLAUDE.md "Never commit secrets"). A one-off run
# against another database can still override with `alembic -x db_url=...` or `-c`/`sqlalchemy.url`.

[alembic]
script_location = backend/db/migrations
prepend_sys_path = .
# Split path lists (prepend_sys_path/version_locations) with os.pathsep, not the legacy
# space/comma/colon splitter — avoids Alembic 1.18's deprecation warning.
path_separator = os
# Timestamped, slug-suffixed revision filenames keep the versions/ directory readable.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

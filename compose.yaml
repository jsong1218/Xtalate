# Xtalate — Tier 1 local stack (MASTER_SPEC Part 9 §1.1; IMPLEMENTATION_PLAN_v0.5 M21 deliverable 5).
#
# `docker compose up` boots the service against the *real* backends it uses in production —
# PostgreSQL and S3-compatible object storage (MinIO) — plus the Redis the M22 worker will consume.
# The done-means: after this comes up, `curl localhost:8000/v1/health?ready=true` is green, and the
# adapter parity suites' Tier 1 legs can run against these services (they read XTALATE_TEST_*).
#
# Credentials below are LOCAL-DEV THROWAWAYS with weak defaults — never production secrets, and no
# real secret is committed (CLAUDE.md "Never commit secrets"). Override every value via the
# environment (or an untracked .env, which `docker compose` loads automatically) for anything real;
# `${VAR:-default}` interpolation means the environment always wins. See `.env.example`.
#
# This is the M21 "first shape" (M22 adds the worker); compose polish (profiles, resource hints) is
# the M25 cut line.

# Shared service configuration for the two processes on the one image — API and worker — so they
# never drift on which database/store/queue they use (Part 9 §2, one artifact, no skew).
x-backend-env: &backend-env
  XTALATE_ENVIRONMENT: tier1
  XTALATE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xtalate}:${POSTGRES_PASSWORD:-xtalate}@postgres:5432/${POSTGRES_DB:-xtalate}
  XTALATE_OBJECT_STORE_BACKEND: s3
  XTALATE_OBJECT_STORE_ENDPOINT: http://minio:9000
  XTALATE_OBJECT_STORE_BUCKET: ${XTALATE_OBJECT_STORE_BUCKET:-xtalate}
  XTALATE_OBJECT_STORE_ACCESS_KEY: ${MINIO_ROOT_USER:-xtalate}
  XTALATE_OBJECT_STORE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-xtalate-local-dev}
  XTALATE_REDIS_URL: redis://queue:6379/0
  # Tier 1 uses the RQ queue: the backend enqueues, the worker executes (M22).
  XTALATE_QUEUE_BACKEND: rq

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xtalate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xtalate}
      POSTGRES_DB: ${POSTGRES_DB:-xtalate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xtalate} -d ${POSTGRES_DB:-xtalate}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-xtalate}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-xtalate-local-dev}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the private bucket and install the lifecycle expiry rule, so §5.2 byte-expiry
  # is locally testable from the first shape (expiry is the storage platform's job, never an app
  # cron). Per-prefix upload/output windows are refined in M24; here a single short rule proves it.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-xtalate}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-xtalate-local-dev}
      BUCKET: ${XTALATE_OBJECT_STORE_BUCKET:-xtalate}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing \"local/$$BUCKET\" &&
      mc anonymous set none \"local/$$BUCKET\" &&
      mc ilm rule add --expire-days 1 \"local/$$BUCKET\" || true &&
      echo 'minio-init: bucket ready with 1-day expiry'
      "
    restart: "no"

  queue:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      queue:
        condition: service_healthy
    environment:
      <<: *backend-env
    ports:
      - "${XTALATE_PORT:-8000}:8000"

  # The RQ worker (M22): the same image, the second entrypoint (Part 9 §2). It executes the jobs the
  # backend enqueues onto Redis. Migrations are the backend's job (its CMD runs `alembic upgrade
  # head`), so the worker only waits for the queue and runs.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "backend.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      queue:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      <<: *backend-env

volumes:
  pgdata:
  miniodata:
